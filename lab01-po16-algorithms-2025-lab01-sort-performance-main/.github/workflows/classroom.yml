name: GitHub Classroom Workflow

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore Lab01SortPerformance.csproj
      
    - name: Build
      run: dotnet build Lab01SortPerformance.csproj --no-restore
      
    - name: Run Program
      id: run-program
      run: |
        dotnet run --project Lab01SortPerformance.csproj --no-build
        echo "exit_code=$?" >> $GITHUB_OUTPUT
      
    - name: Run tests
      uses: education/autograding@v1
      with:
        tests: |
          {
            "name": "Lab01 Execution Test",
            "setup": "",
            "run": "dotnet run --project Lab01SortPerformance.csproj --no-build",
            "input": "",
            "output": "",
            "comparison": "exact",
            "timeout": 30,
            "points": 5
          }